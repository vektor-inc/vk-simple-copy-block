name: PHP Unit Test

on:
    pull_request:
        branches:
            - main
            - develop
            - ^feature/.+

jobs:
    php_unit:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                php-versions: ['7.4', '8.2', '8.3']
                wp-versions: ['6.8','6.7','6.6']
        name: PHP Unit test ${{ matrix.php-versions }} / WP ${{ matrix.wp-versions }} Test
        services:
            mysql:
                image: mysql:5.7
                ports:
                    - 3306
                env:
                    MYSQL_ROOT_PASSWORD: wordpress
                    MYSQL_DATABASE: wordpress
                    MYSQL_USER: wordpress
                    MYSQL_PASSWORD: wordpress
        steps:
            - uses: actions/checkout@v3
            - name: Setup Node.js (.node-version)
              uses: actions/setup-node@v3
              with:
                  node-version: 20.x
            - name: Cache multiple paths
              uses: actions/cache@v3
              with:
                  path: vendor
                  key: ${{ runner.os }}-php${{ matrix.php-versions }}-${{ hashFiles('**/composer.lock') }}
            - name: Setup PHP ${{ matrix.php-versions }}
              uses: shivammathur/setup-php@v2
              with:
                  php-version: ${{ matrix.php-versions }}
            - name: install npm scripts
              run: npm install
            - name: Install Composer Packages
              run: composer install
            - name: Install several WordPress version by wp-env.override.json
              run: |
                  n=0
                  success=false
                  until [ "$n" -ge 3 ]
                  do
                    if WP_ENV_PHP_VERSION=${{ matrix.php-versions }} WP_ENV_CORE=WordPress/WordPress#${{ matrix.wp-versions }} npm run wp-env start --update; then
                      success=true
                      break
                    fi
                    n=$((n+1))
                    echo "Retrying wp-env start --update ($n)..."
                    sleep 5
                  done
                  if [ "$success" = false ]; then
                    echo "Error: Failed to start wp-env after 3 attempts"
                    npm run wp-env info || true
                    exit 1
                  fi
            - name: Wait for wp-env containers to be ready
              run: |
                  echo "Waiting for wp-env containers to be ready..."
                  n=0
                  until [ "$n" -ge 30 ]
                  do
                    if npm run wp-env run cli wp core version > /dev/null 2>&1; then
                      echo "Containers are ready!"
                      break
                    fi
                    n=$((n+1))
                    echo "Waiting for containers... ($n/30)"
                    sleep 2
                  done
                  if [ "$n" -ge 30 ]; then
                    echo "Error: Containers did not start within 60 seconds"
                    npm run wp-env info || true
                    exit 1
                  fi
            - name: Check WordPress Version
              run: npm run wp-env run cli wp core version
            # Change Permissions
            - name: Change Permissions
              run: sudo chmod -R 777 ~/wp-env
            - name: Run PHP Unit Test
              run: npm run phpunit
